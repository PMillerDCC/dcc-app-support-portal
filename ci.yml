name: CI - Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    # MVC PROJECT
    - name: Restore MVC
      run: dotnet restore AppSupportPortal.Web/AppSupportPortal.Web.csproj

    - name: Build MVC
      run: dotnet build AppSupportPortal.Web/AppSupportPortal.Web.csproj --configuration Release --no-restore

    # API PROJECT
    - name: Restore API
      run: dotnet restore SeDevOps.Api/SeDevOps.Api.csproj

    - name: Build API
      run: dotnet build SeDevOps.Api/SeDevOps.Api.csproj --configuration Release --no-restore

    # TESTS (only runs if you have test projects)
    - name: Run tests
      run: dotnet test --configuration Release --no-build --verbosity normal